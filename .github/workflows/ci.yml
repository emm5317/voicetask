name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install Templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Generate Templ
        run: templ generate
      - name: Install Tailwind CSS
        run: |
          mkdir -p bin
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          mv tailwindcss-linux-x64 ./bin/tailwindcss
      - name: Build CSS
        run: make css
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voicetask
          POSTGRES_PASSWORD: voicetask
          POSTGRES_DB: voicetask_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install Templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Generate Templ
        run: templ generate
      - name: Install Tailwind CSS
        run: |
          mkdir -p bin
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          mv tailwindcss-linux-x64 ./bin/tailwindcss
      - name: Build CSS
        run: make css
      - name: Install pgcrypto extension
        run: PGPASSWORD=voicetask psql -h localhost -U voicetask -d voicetask_test -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://voicetask:voicetask@localhost:5432/voicetask_test?sslmode=disable
        run: go test -race -count=1 ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install Templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Generate Templ
        run: templ generate
      - name: Install Tailwind CSS
        run: |
          mkdir -p bin
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          mv tailwindcss-linux-x64 ./bin/tailwindcss
      - name: Build CSS
        run: make css
      - name: Build
        run: go build -o voicetask .
      - name: Cross-compile for Linux
        run: GOOS=linux GOARCH=amd64 go build -o voicetask-linux .
