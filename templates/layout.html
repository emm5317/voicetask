<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VoiceTask</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0f0f0d">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.14.8/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* Hide Alpine-managed elements until Alpine loads */
        [x-cloak] { display: none !important; }

        /* === Theme variables === */
        :root {
            --bg: #0f0f0d; --bg-surface: #161614; --bg-hover: rgba(255,255,255,0.025);
            --text: #c8c4be; --text-bright: #eae7e2; --text-dim: #5a5850;
            --text-muted: #3e3c38; --text-faint: #2e2c28;
            --border: #242220; --border-dim: #1e1d1a;
            --accent: #d4915c; --accent-dim: #a87040;
            --error: #e8655c; --high: #d4975c;
        }
        [data-theme="light"] {
            --bg: #f5f3f0; --bg-surface: #ffffff; --bg-hover: rgba(0,0,0,0.03);
            --text: #2a2820; --text-bright: #1a1810; --text-dim: #6a6660;
            --text-muted: #9a9690; --text-faint: #c0bcb6;
            --border: #e0ddd8; --border-dim: #d0cdc8;
            --accent: #b87040; --accent-dim: #9a5c30;
            --error: #dc4040; --high: #c08040;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh; min-height: 100dvh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        @keyframes micPulse { 0%{transform:scale(0.96);opacity:0.5} 100%{transform:scale(1.35);opacity:0} }
        @keyframes slideUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes waveBar { 0%{height:3px;opacity:0.25} 100%{height:12px;opacity:0.7} }
        @keyframes spin { to{transform:rotate(360deg)} }

        :focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
        input:focus { outline:none; }
        input::placeholder { color: var(--text-muted); }

        ::-webkit-scrollbar { width:3px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border-dim); border-radius:3px; }

        .task-row { transition:background 0.15s ease; }
        .task-row:hover { background:var(--bg-hover); }
        .sortable-ghost { opacity:0.3; }

        .btn-icon {
            width:44px; height:44px; border-radius:8px; border:none; background:transparent;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            color:var(--text-faint); transition:all 0.15s ease; font-size:16px;
        }
        .btn-icon:hover { background:rgba(232,101,92,0.08); color:var(--error); }
        @media (pointer:coarse) { .btn-icon { color:var(--text-muted); } }

        .top-accent {
            position:fixed; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg, transparent 10%, var(--accent) 50%, transparent 90%);
            opacity:0.3; z-index:10;
        }

        /* Tablet optimization: wider content area */
        @media (min-width:768px) {
            .main-content { max-width:680px; padding:0 32px 100px; }
        }
    </style>
</head>
<body x-data="themeToggle()" :data-theme="theme">
    <div class="top-accent"></div>
    <div id="error-toast" style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;display:none;">
        <div style="background:rgba(232,101,92,0.1);border:1px solid rgba(232,101,92,0.2);color:var(--error);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;backdrop-filter:blur(8px);">
            Something went wrong. Please try again.
        </div>
    </div>
    <div class="main-content" style="max-width:620px;margin:0 auto;padding:0 24px 100px;">
        {{template "content" .}}
    </div>
    <script>
    function themeToggle() {
        return {
            theme: localStorage.getItem('vt-theme') || 'dark',
            toggle() {
                this.theme = this.theme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('vt-theme', this.theme);
            }
        };
    }
    document.body.addEventListener('htmx:responseError', function() {
        var t = document.getElementById('error-toast');
        t.style.display='block'; t.style.animation='fadeIn 0.2s ease both';
        setTimeout(function(){ t.style.display='none'; }, 3000);
    });
    </script>
</body>
</html>
