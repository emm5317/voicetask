{{define "content"}}
<!-- Header -->
<header style="padding:28px 0 20px; display:flex; align-items:center; justify-content:space-between;">
    <!-- Wordmark -->
    <div style="display:flex; align-items:center; gap:10px;">
        <div style="display:flex; align-items:center; gap:2.5px; height:22px;">
            <div style="width:2.5px; height:7px; border-radius:1.5px; background:var(--accent); opacity:0.5;"></div>
            <div style="width:2.5px; height:13px; border-radius:1.5px; background:var(--accent); opacity:0.5;"></div>
            <div style="width:2.5px; height:20px; border-radius:1.5px; background:var(--accent); opacity:0.5;"></div>
            <div style="width:2.5px; height:15px; border-radius:1.5px; background:var(--accent);"></div>
            <div style="width:2.5px; height:10px; border-radius:1.5px; background:var(--accent);"></div>
            <div style="width:2.5px; height:18px; border-radius:1.5px; background:var(--accent);"></div>
            <div style="width:2.5px; height:11px; border-radius:1.5px; background:var(--accent); opacity:0.5;"></div>
            <div style="width:2.5px; height:6px; border-radius:1.5px; background:var(--accent); opacity:0.5;"></div>
        </div>
        <div style="display:flex; align-items:baseline; gap:1px;">
            <span style="font-family:'Instrument Serif',serif; font-size:24px; color:var(--text); letter-spacing:-0.01em;">voice</span>
            <span style="font-family:'Plus Jakarta Sans',sans-serif; font-size:17px; font-weight:700; color:var(--accent); letter-spacing:0.06em; text-transform:uppercase;">task</span>
        </div>
    </div>
    <!-- Right: clock + theme toggle -->
    <div style="display:flex; align-items:center; gap:12px;">
        <div x-data="clock()" style="display:flex; flex-direction:column; align-items:flex-end; gap:2px;">
            <span x-text="time" style="font-size:13px; font-weight:500; color:var(--text-dim); font-family:'JetBrains Mono',monospace;"></span>
            <span x-text="date" style="font-size:11px; color:var(--text-muted);"></span>
        </div>
        <!-- Theme toggle -->
        <button @click="toggle()" style="width:36px; height:36px; border-radius:8px; border:1px solid var(--border); background:var(--bg-surface); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:16px; transition:all 0.2s;">
            <span x-text="theme === 'dark' ? '&#9788;' : '&#9790;'"></span>
        </button>
    </div>
</header>

<!-- Status strip -->
<div style="display:flex; align-items:center; gap:16px; padding:0 4px 20px;">
    <div style="display:flex; align-items:center; gap:6px;">
        <span style="font-size:22px; font-weight:700; color:var(--text-bright); font-family:'JetBrains Mono',monospace; letter-spacing:-0.03em;">{{.TotalOpen}}</span>
        <span style="font-size:12px; color:var(--text-muted);">open</span>
    </div>
    {{if gt .UrgentCount 0}}
    <div style="display:flex; align-items:center; gap:5px; padding:3px 10px; border-radius:8px; background:rgba(232,101,92,0.06);">
        <div style="width:5px; height:5px; border-radius:50%; background:var(--error); box-shadow:0 0 6px rgba(232,101,92,0.4);"></div>
        <span style="font-size:11px; font-weight:600; color:var(--error); letter-spacing:0.03em;">{{.UrgentCount}} urgent</span>
    </div>
    {{end}}
</div>

<!-- Capture bar (Alpine voice component — outside HTMX swap target) -->
<div x-data="voiceCapture()" style="display:flex; gap:10px; margin-bottom:24px;"
     @keydown.slash.window.prevent="$refs.taskInput.focus()">
    <div style="flex:1; position:relative; border-radius:14px; background:var(--bg-surface); border:1px solid var(--border); transition:border-color 0.3s;">
        <input type="text" x-ref="taskInput" autocomplete="off"
               x-model="transcript"
               :placeholder="listening ? 'Listening…' : 'Capture a task…'"
               @keydown.enter.prevent="submitTask()"
               style="width:100%; padding:15px 16px; background:transparent; border:none; color:var(--text-bright); font-size:14px; font-family:'Plus Jakarta Sans',sans-serif;">
    </div>
    <!-- Spinner (only when submitting) -->
    <div x-show="submitting" x-cloak style="display:flex; align-items:center; padding:0 4px;">
        <div style="width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite;"></div>
    </div>
    <!-- Mic button -->
    <button x-show="speechSupported" @click="toggleListening()"
            style="width:48px; height:48px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.25s ease;"
            :style="listening
                ? 'background:#e8655c; box-shadow:0 0 0 4px rgba(232,101,92,0.2); transform:scale(1.05);'
                : 'background:var(--accent); box-shadow:0 4px 16px rgba(212,145,92,0.15);'">
        <!-- Mic icon -->
        <svg x-show="!listening" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2" /><line x1="12" y1="19" x2="12" y2="22" />
        </svg>
        <!-- Stop icon -->
        <svg x-show="listening" x-cloak width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="6" width="12" height="12" rx="2" />
        </svg>
    </button>
</div>

<!-- Listening indicator (only when actively listening) -->
<div x-data="{ get active() { return window._vtListening || false } }"
     x-effect="active = window._vtListening"
     id="listening-indicator" style="display:none; align-items:center; justify-content:center; gap:6px; padding:0 0 16px;">
    <div style="display:flex; align-items:center; gap:2px; height:14px;">
        <div style="width:2px;border-radius:1px;background:var(--error);animation:waveBar 0.7s ease-in-out 0s infinite alternate;"></div>
        <div style="width:2px;border-radius:1px;background:var(--error);animation:waveBar 0.7s ease-in-out 0.08s infinite alternate;"></div>
        <div style="width:2px;border-radius:1px;background:var(--error);animation:waveBar 0.7s ease-in-out 0.16s infinite alternate;"></div>
        <div style="width:2px;border-radius:1px;background:var(--error);animation:waveBar 0.7s ease-in-out 0.24s infinite alternate;"></div>
        <div style="width:2px;border-radius:1px;background:var(--error);animation:waveBar 0.7s ease-in-out 0.32s infinite alternate;"></div>
    </div>
    <span style="font-size:11px; color:var(--error); font-weight:600; letter-spacing:0.04em; text-transform:uppercase;">Listening</span>
</div>

<!-- Divider -->
<div style="height:1px; margin-bottom:8px; background:linear-gradient(90deg, transparent, var(--border) 30%, var(--border) 70%, transparent);"></div>

<!-- SSE listener -->
<div hx-ext="sse" sse-connect="/tasks/stream" style="display:none;">
    <div hx-get="/tasks/list" hx-trigger="sse:tasks-updated" hx-target="#task-list" hx-swap="outerHTML"></div>
</div>

<!-- Task list -->
{{template "tasklist.html" .}}

<!-- Clear completed -->
{{if .HasComplete}}
<div x-data="{ confirm: false }" style="display:flex; justify-content:center; padding:20px 0 8px;">
    <button x-show="!confirm" @click="confirm = true"
            style="font-size:11.5px; color:var(--text-muted); font-weight:500; background:transparent; border:1px solid var(--border-dim); border-radius:10px; padding:8px 20px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; transition:all 0.2s;">
        Clear completed
    </button>
    <div x-show="confirm" x-cloak style="display:flex; gap:8px; align-items:center; padding:4px 12px; border-radius:10px; background:var(--bg-surface);">
        <span style="font-size:12px; color:var(--text-dim);">Clear all completed?</span>
        <button hx-post="/tasks/clear" hx-target="#task-list" hx-swap="outerHTML" @click="confirm = false"
                style="font-size:11.5px; color:var(--error); font-weight:600; background:rgba(232,101,92,0.08); border:none; border-radius:7px; padding:6px 14px; cursor:pointer;">
            Confirm
        </button>
        <button @click="confirm = false"
                style="font-size:11.5px; color:var(--text-muted); background:transparent; border:none; padding:6px 8px; cursor:pointer;">
            Cancel
        </button>
    </div>
</div>
{{end}}

<script>
function clock() {
    return {
        time: '', date: '',
        init() { this.tick(); setInterval(() => this.tick(), 60000); },
        tick() {
            var n = new Date();
            this.time = n.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
            this.date = n.toLocaleDateString('en-US', {weekday:'long',month:'short',day:'numeric'});
        }
    };
}

// Global flag for listening state (simple, avoids Alpine store issues)
window._vtListening = false;

function voiceCapture() {
    return {
        listening: false,
        transcript: '',
        submitting: false,
        recognition: null,
        speechSupported: false,
        silenceTimer: null,

        init() {
            var saved = localStorage.getItem('vt-draft');
            if (saved) this.transcript = saved;
            this.$watch('transcript', function(v) { localStorage.setItem('vt-draft', v); });

            var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return;
            this.speechSupported = true;

            this.recognition = new SR();
            this.recognition.continuous = true;
            this.recognition.interimResults = true;
            this.recognition.lang = 'en-US';

            var self = this;
            this.recognition.onresult = function(e) {
                self.transcript = Array.from(e.results).map(function(r){return r[0].transcript;}).join('');
                // Reset silence timer on each new result
                self.resetSilenceTimer();
            };
            this.recognition.onend = function() {
                // With continuous=true, onend fires on manual stop or error
                self.clearSilenceTimer();
                if (self.listening) {
                    self.setListening(false);
                    if (self.transcript.trim()) self.submitTask();
                }
            };
            this.recognition.onerror = function(e) {
                if (e.error !== 'no-speech') {
                    self.clearSilenceTimer();
                    self.setListening(false);
                }
            };
        },

        resetSilenceTimer() {
            this.clearSilenceTimer();
            var self = this;
            this.silenceTimer = setTimeout(function() {
                if (self.listening && self.transcript.trim()) {
                    self.recognition.stop();
                }
            }, 3000);
        },

        clearSilenceTimer() {
            if (this.silenceTimer) { clearTimeout(this.silenceTimer); this.silenceTimer = null; }
        },

        setListening(val) {
            this.listening = val;
            window._vtListening = val;
            var el = document.getElementById('listening-indicator');
            if (el) el.style.display = val ? 'flex' : 'none';
        },

        toggleListening() {
            if (this.listening) {
                this.clearSilenceTimer();
                this.recognition.stop();
            } else {
                this.transcript = '';
                this.setListening(true);
                this.recognition.start();
            }
        },

        submitTask() {
            var text = this.transcript.trim();
            if (!text || this.submitting) return;
            this.submitting = true;
            var self = this;
            self.transcript = '';
            localStorage.removeItem('vt-draft');

            htmx.ajax('POST', '/tasks', {
                target: '#task-list', swap: 'outerHTML',
                values: { input: text, source: self.listening ? 'voice' : 'text' }
            }).then(function() { self.submitting = false; })
              .catch(function() { self.submitting = false; });
        }
    };
}

// SortableJS init
function initSortable() {
    document.querySelectorAll('.sortable-group').forEach(function(el) {
        if (el._sortable) el._sortable.destroy();
        el._sortable = new Sortable(el, {
            animation: 200, ghostClass: 'sortable-ghost',
            onEnd: function() {
                var items = [];
                el.querySelectorAll('.task-row[data-id]').forEach(function(row, i) {
                    items.push({id: row.dataset.id, sort_order: i});
                });
                fetch('/tasks/reorder', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(items)
                });
            }
        });
    });
}
document.addEventListener('DOMContentLoaded', initSortable);
document.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail.target && e.detail.target.id === 'task-list') initSortable();
});
</script>
{{end}}
