{{define "content"}}
<!-- Header -->
<header style="padding:28px 0 20px; display:flex; align-items:center; justify-content:space-between; animation:fadeIn 0.5s ease both;">
    <!-- Wordmark -->
    <div style="display:flex; align-items:center; gap:10px;">
        <div style="display:flex; align-items:center; gap:2.5px; height:22px; padding:0 2px;">
            <div style="width:2.5px; height:7px; border-radius:1.5px; background:#d4915c80;"></div>
            <div style="width:2.5px; height:13px; border-radius:1.5px; background:#d4915c80;"></div>
            <div style="width:2.5px; height:20px; border-radius:1.5px; background:#d4915c80;"></div>
            <div style="width:2.5px; height:15px; border-radius:1.5px; background:#d4915c;"></div>
            <div style="width:2.5px; height:10px; border-radius:1.5px; background:#d4915c;"></div>
            <div style="width:2.5px; height:18px; border-radius:1.5px; background:#d4915c;"></div>
            <div style="width:2.5px; height:11px; border-radius:1.5px; background:#d4915c80;"></div>
            <div style="width:2.5px; height:6px; border-radius:1.5px; background:#d4915c80;"></div>
        </div>
        <div style="display:flex; align-items:baseline; gap:1px;">
            <span style="font-family:'Instrument Serif',serif; font-size:24px; color:#c8c4be; letter-spacing:-0.01em;">voice</span>
            <span style="font-family:'Plus Jakarta Sans',sans-serif; font-size:17px; font-weight:700; color:#d4915c; letter-spacing:0.06em; text-transform:uppercase; position:relative; top:0.5px;">task</span>
        </div>
    </div>
    <!-- Clock -->
    <div x-data="clock()" style="display:flex; flex-direction:column; align-items:flex-end; gap:2px;">
        <span x-text="time" style="font-size:13px; font-weight:500; color:#5a5850; font-family:'JetBrains Mono',monospace; letter-spacing:-0.01em;"></span>
        <span x-text="date" style="font-size:11px; color:#3a3830; font-weight:400;"></span>
    </div>
</header>

<!-- Status strip -->
<div style="display:flex; align-items:center; gap:16px; padding:0 4px 20px; animation:fadeIn 0.5s ease 0.05s both;">
    <div style="display:flex; align-items:center; gap:6px;">
        <span style="font-size:22px; font-weight:700; color:#e0ddd8; font-family:'JetBrains Mono',monospace; letter-spacing:-0.03em;">{{.TotalOpen}}</span>
        <span style="font-size:12px; color:#4a4840; font-weight:400;">open</span>
    </div>
    {{if gt .UrgentCount 0}}
    <div style="display:flex; align-items:center; gap:5px; padding:3px 10px; border-radius:8px; background-color:#e8655c10;">
        <div style="width:5px; height:5px; border-radius:50%; background-color:#e8655c; box-shadow:0 0 6px #e8655c60;"></div>
        <span style="font-size:11px; font-weight:600; color:#e8655c; letter-spacing:0.03em;">{{.UrgentCount}} urgent</span>
    </div>
    {{end}}
    <!-- Listening indicator (Alpine controlled) -->
    <div x-data x-show="$store.voice.listening" x-cloak
         style="display:flex; align-items:center; gap:6px; margin-left:auto; animation:fadeIn 0.25s ease both;">
        <div style="display:flex; align-items:center; gap:2px; height:14px;">
            <div style="width:2px; border-radius:1px; background:#e8655c; animation:waveBar 0.7s ease-in-out 0s infinite alternate; opacity:0.6;"></div>
            <div style="width:2px; border-radius:1px; background:#e8655c; animation:waveBar 0.7s ease-in-out 0.06s infinite alternate; opacity:0.6;"></div>
            <div style="width:2px; border-radius:1px; background:#e8655c; animation:waveBar 0.7s ease-in-out 0.12s infinite alternate; opacity:0.6;"></div>
            <div style="width:2px; border-radius:1px; background:#e8655c; animation:waveBar 0.7s ease-in-out 0.18s infinite alternate; opacity:0.6;"></div>
            <div style="width:2px; border-radius:1px; background:#e8655c; animation:waveBar 0.7s ease-in-out 0.24s infinite alternate; opacity:0.6;"></div>
            <div style="width:2px; border-radius:1px; background:#e8655c; animation:waveBar 0.7s ease-in-out 0.30s infinite alternate; opacity:0.6;"></div>
            <div style="width:2px; border-radius:1px; background:#e8655c; animation:waveBar 0.7s ease-in-out 0.36s infinite alternate; opacity:0.6;"></div>
        </div>
        <span style="font-size:11px; color:#e8655c; font-weight:600; letter-spacing:0.04em; text-transform:uppercase;">Listening</span>
    </div>
</div>

<!-- Capture bar (outside HTMX swap target to preserve Alpine state) -->
<div x-data="voiceCapture()" style="display:flex; gap:10px; margin-bottom:28px; animation:fadeIn 0.5s ease 0.1s both;"
     @keydown.slash.window.prevent="$refs.taskInput.focus()">
    <form hx-post="/tasks" hx-target="#task-list" hx-swap="innerHTML" hx-indicator="#submit-spinner"
          style="flex:1; display:flex; gap:10px;" @submit.prevent>
        <div style="flex:1; position:relative; border-radius:14px; background-color:#161614; border:1px solid #242220; transition:border-color 0.3s ease;"
             :style="listening && 'animation:inputGlow 2.5s ease infinite'">
            <input type="text" name="input" x-ref="taskInput" autocomplete="off"
                   x-model="transcript"
                   :placeholder="listening ? 'Listening…' : 'Capture a task…'"
                   @keydown.enter="submitTask()"
                   style="width:100%; padding:15px 44px 15px 16px; background:transparent; border:none; color:#dedad4; font-size:14px; font-weight:400; font-family:'Plus Jakarta Sans',sans-serif; letter-spacing:0.005em;">
            <template x-if="!transcript && !listening">
                <kbd style="position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:10px; color:#2e2c28; border:1px solid #222220; border-radius:4px; padding:2px 6px; font-family:'JetBrains Mono',monospace; font-weight:500; line-height:1;">/</kbd>
            </template>
        </div>
        <input type="hidden" name="source" :value="lastSource">
        <!-- Submit spinner (hidden until htmx request in flight) -->
        <div id="submit-spinner" class="htmx-indicator" style="align-items:center; padding:0 8px;">
            <div style="width:20px; height:20px; border:2px solid #2a2820; border-top-color:#d4915c; border-radius:50%; animation:spin 0.6s linear infinite;"></div>
        </div>
    </form>
    <!-- Mic button -->
    <button @click="toggleListening()" :aria-label="listening ? 'Stop listening' : 'Start voice capture'"
            style="width:52px; height:52px; border-radius:14px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative; flex-shrink:0; transition:all 0.3s cubic-bezier(0.4,0,0.2,1);"
            :style="listening
                ? 'background:linear-gradient(140deg,#c24040,#e8655c); box-shadow:0 0 0 3px #e8655c25,0 6px 24px #e8655c30; transform:scale(1.04);'
                : 'background:linear-gradient(140deg,#a87040,#d4915c); box-shadow:0 6px 24px #d4915c20; transform:scale(1);'"
            x-show="speechSupported">
        <template x-if="listening">
            <div style="position:absolute; inset:-5px; border-radius:18px; border:2px solid #e8655c50; animation:micPulse 1.6s ease-out infinite; pointer-events:none;"></div>
        </template>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <template x-if="listening">
                <rect x="6.5" y="6.5" width="11" height="11" rx="2" />
            </template>
            <template x-if="!listening">
                <g>
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                    <line x1="12" y1="19" x2="12" y2="22" />
                </g>
            </template>
        </svg>
    </button>
</div>

<!-- Divider -->
<div style="height:1px; margin-bottom:8px; background:linear-gradient(90deg, transparent, #242220 30%, #242220 70%, transparent); animation:fadeIn 0.5s ease 0.15s both;"></div>

<!-- SSE listener (hidden, triggers task list refresh) -->
<div hx-ext="sse" sse-connect="/tasks/stream" style="display:none;">
    <div hx-get="/" hx-trigger="sse:tasks-updated" hx-target="#task-list" hx-select="#task-list" hx-swap="innerHTML"></div>
</div>

<!-- Task list (HTMX swap target) -->
{{template "tasklist.html" .}}

<!-- Clear completed -->
{{if .HasComplete}}
<div x-data="{ confirm: false }" style="display:flex; justify-content:center; padding:20px 0 8px; animation:fadeIn 0.4s ease both;">
    <template x-if="!confirm">
        <button @click="confirm = true" class="clear-btn"
                style="font-size:11.5px; color:#3e3c38; font-weight:500; background:transparent; border:1px solid #1e1d1a; border-radius:10px; padding:8px 20px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; letter-spacing:0.02em;">
            Clear completed
        </button>
    </template>
    <template x-if="confirm">
        <div style="display:flex; gap:8px; align-items:center; animation:fadeIn 0.15s ease both; padding:4px 12px; border-radius:10px; background-color:#161614;">
            <span style="font-size:12px; color:#5a5850;">Clear all completed?</span>
            <button hx-post="/tasks/clear" hx-target="#task-list" hx-swap="innerHTML" @click="confirm = false"
                    style="font-size:11.5px; color:#e8655c; font-weight:600; background:#e8655c12; border:none; border-radius:7px; padding:6px 14px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif;">
                Confirm
            </button>
            <button @click="confirm = false"
                    style="font-size:11.5px; color:#4a4840; font-weight:500; background:transparent; border:none; padding:6px 8px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif;">
                Cancel
            </button>
        </div>
    </template>
</div>
{{end}}

<style>
    @keyframes spin { to { transform: rotate(360deg); } }
    [x-cloak] { display: none !important; }
</style>

<!-- Alpine components -->
<script>
function clock() {
    return {
        time: '', date: '',
        init() {
            this.tick();
            setInterval(() => this.tick(), 60000);
        },
        tick() {
            const now = new Date();
            this.time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            this.date = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        }
    };
}

document.addEventListener('alpine:init', () => {
    Alpine.store('voice', { listening: false });
});

function voiceCapture() {
    return {
        listening: false,
        transcript: '',
        lastSource: 'text',
        recognition: null,
        speechSupported: false,

        init() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return;
            this.speechSupported = true;

            this.recognition = new SR();
            this.recognition.continuous = false;
            this.recognition.interimResults = true;
            this.recognition.lang = 'en-US';

            this.recognition.onresult = (e) => {
                this.transcript = Array.from(e.results)
                    .map(r => r[0].transcript).join('');
            };

            this.recognition.onend = () => {
                this.listening = false;
                Alpine.store('voice').listening = false;
                if (this.transcript.trim()) {
                    this.lastSource = 'voice';
                    this.submitTask();
                }
            };

            this.recognition.onerror = (e) => {
                console.error('Speech error:', e.error);
                this.listening = false;
                Alpine.store('voice').listening = false;
            };
        },

        toggleListening() {
            if (this.listening) {
                this.recognition.stop();
            } else {
                this.transcript = '';
                this.listening = true;
                Alpine.store('voice').listening = true;
                this.recognition.start();
            }
        },

        submitTask() {
            if (!this.transcript.trim()) return;
            const form = this.$el.closest('div').querySelector('form');
            if (form) {
                htmx.trigger(form, 'submit');
                // Use htmx to submit the form
                const input = form.querySelector('input[name="input"]');
                if (input) input.value = this.transcript;
                htmx.ajax('POST', '/tasks', {
                    source: form,
                    target: '#task-list',
                    swap: 'innerHTML',
                    values: { input: this.transcript, source: this.lastSource }
                });
                this.transcript = '';
                this.lastSource = 'text';
            }
        }
    };
}
</script>
{{end}}
