{{define "weeklysummary.html"}}
<div id="time-panel" style="position:sticky; top:20px;">
    <!-- Week header -->
    <div style="display:flex; align-items:center; justify-content:space-between; padding:0 0 16px;">
        <button hx-get="/time/weekly?week={{.PrevWeek}}" hx-target="#time-panel" hx-swap="outerHTML"
                style="width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:var(--bg-surface); color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px;">&#9664;</button>
        <div style="text-align:center;">
            <div style="font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim);">Weekly Summary</div>
            <div style="font-size:14px; font-weight:600; color:var(--text-bright);">{{.WeekLabel}}</div>
        </div>
        <button hx-get="/time/weekly?week={{.NextWeek}}" hx-target="#time-panel" hx-swap="outerHTML"
                style="width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:var(--bg-surface); color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px;">&#9654;</button>
    </div>

    <!-- Grid table -->
    <div style="overflow-x:auto; border-radius:10px; border:1px solid var(--border); background:var(--bg-surface);">
        <table style="width:100%; border-collapse:collapse; font-size:12px; font-family:'JetBrains Mono',monospace;">
            <thead>
                <tr style="border-bottom:1px solid var(--border);">
                    <th style="text-align:left; padding:10px 12px; font-size:11px; font-weight:600; color:var(--text-muted); letter-spacing:0.04em;">Matter</th>
                    {{range .DayLabels}}
                    <th style="text-align:center; padding:10px 8px; font-size:10px; font-weight:600; color:var(--text-muted); letter-spacing:0.04em; white-space:nowrap;">{{.}}</th>
                    {{end}}
                    <th style="text-align:right; padding:10px 12px; font-size:11px; font-weight:600; color:var(--text-muted);">Total</th>
                </tr>
            </thead>
            <tbody>
                {{range .Rows}}
                <tr style="border-bottom:1px solid var(--border-dim);">
                    <td style="padding:8px 12px; font-size:12px; font-weight:600; color:{{.Meta.Accent}}; font-family:'Plus Jakarta Sans',sans-serif;">{{.Meta.Label}}</td>
                    {{range .Days}}
                    <td style="text-align:center; padding:8px; color:{{if eq . "-"}}var(--text-faint){{else}}var(--text){{end}};">{{.}}</td>
                    {{end}}
                    <td style="text-align:right; padding:8px 12px; font-weight:700; color:var(--text-bright);">{{.Total}}</td>
                </tr>
                {{end}}
            </tbody>
            <tfoot>
                <tr style="border-top:2px solid var(--border);">
                    <td style="padding:10px 12px; font-size:12px; font-weight:700; color:var(--text-bright); font-family:'Plus Jakarta Sans',sans-serif;">Total</td>
                    {{range .TotalDays}}
                    <td style="text-align:center; padding:10px 8px; font-weight:700; color:{{if eq . "-"}}var(--text-faint){{else}}var(--text-bright){{end}};">{{.}}</td>
                    {{end}}
                    <td style="text-align:right; padding:10px 12px; font-weight:700; color:var(--accent); font-size:14px;">{{.GrandTotal}}</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <!-- Back to daily view -->
    <div style="display:flex; justify-content:center; padding:16px 0;">
        <button hx-get="/time/list" hx-target="#time-panel" hx-swap="outerHTML"
                style="font-size:12px; color:var(--text-dim); background:transparent; border:1px solid var(--border); border-radius:8px; padding:8px 20px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif;">
            &#8592; Back to daily view
        </button>
    </div>
</div>
{{end}}
