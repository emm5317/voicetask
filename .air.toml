root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/voicetask"
  cmd = "go build -o ./tmp/voicetask ."
  delay = 500
  exclude_dir = ["tmp", "vendor", ".git"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "html", "json"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
